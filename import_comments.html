<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Import komentářů do Firestore</title>
  <style>
    body {
      font-family: monospace;
      background: #0e0e0e;
      color: #c8c2b8;
      padding: 2rem;
    }

    button {
      background: #c8a86e;
      border: none;
      color: #0e0e0e;
      padding: 0.6rem 1.4rem;
      font-family: monospace;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #log {
      white-space: pre;
      line-height: 1.6;
      font-size: 0.85rem;
    }

    .ok {
      color: #6abf69;
    }

    .err {
      color: #f87171;
    }

    .dim {
      color: #5a5550;
    }
  </style>
</head>

<body>
  <h2>Import komentářů → Firestore</h2>
  <p>Spusťte jednou. Importuje všechny staré komentáře z Blogger exportu.</p>
  <button id="btn" onclick="startImport()">Spustit import</button>
  <div id="log"></div>

  <script type="importmap">
{
  "imports": {
    "firebase/app":       "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/auth":      "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  }
}
</script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "firebase/auth";
    import { getFirestore, collection, addDoc, Timestamp } from "firebase/firestore";

    // ── Paste your Firebase config here ──
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDjJKW_XmWE7ayzYQO8XSOx6XdtG1SDcr8",
      authDomain: "stuprumblog.firebaseapp.com",
      projectId: "stuprumblog",
      storageBucket: "stuprumblog.firebasestorage.app",
      messagingSenderId: "442612700149",
      appId: "1:442612700149:web:33720bb1d90c4b215186bc",
      measurementId: "G-EHTSGRHC3K"
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const log = document.getElementById('log');
    function out(msg, cls = '') { log.innerHTML += `<span class="${cls}">${msg}\n</span>`; }

    window.startImport = async function () {
      const btn = document.getElementById('btn');
      btn.disabled = true;

      // Sign in first so Firestore rules allow writes
      out('Přihlašuji přes Google…', 'dim');
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
        out('Přihlášen. ✓', 'ok');
      } catch (e) {
        out('Chyba přihlášení: ' + e.message, 'err');
        btn.disabled = false;
        return;
      }

      out('Načítám komentáře…', 'dim');
      const comments = await (await fetch('comments.json')).json();
      out(`Nalezeno ${comments.length} komentářů. Začínám import…\n`, 'dim');

      let ok = 0, fail = 0;
      const col = collection(db, 'comments');
      const BATCH = 20; // small batches to avoid rate limits

      for (let i = 0; i < comments.length; i++) {
        const c = comments[i];
        try {
          await addDoc(col, {
            postId: c.postId,
            authorName: c.authorName,
            text: c.text,
            createdAt: c.createdAt ? Timestamp.fromDate(new Date(c.createdAt)) : Timestamp.now(),
            imported: true
          });
          ok++;
          if (ok % BATCH === 0) out(`  ${ok}/${comments.length} importováno…`, 'dim');
        } catch (e) {
          fail++;
          out(`  Chyba u komentáře ${i}: ${e.message}`, 'err');
        }
        // small delay every batch to avoid hammering Firestore
        if (i % BATCH === BATCH - 1) await new Promise(r => setTimeout(r, 300));
      }

      out(`\nHotovo! ✓ ${ok} importováno, ${fail} chyb.`, ok > 0 ? 'ok' : 'err');
    };
  </script>
</body>

</html>
